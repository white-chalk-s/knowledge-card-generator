<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>黑白强标题招募海报线框模板</title>
  <style>
    :root {
      /* Typography */
      --font-family-base: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", "Noto Sans SC", Arial, sans-serif;
      --font-family-display: Impact, "Arial Black", "PingFang SC", "Microsoft YaHei", sans-serif;

      --font-size-h1: clamp(3.2rem, 12vw, 6.4rem);
      --font-size-h2: clamp(2.25rem, 8vw, 4.2rem);
      --font-size-h3: clamp(1rem, 3vw, 1.45rem);
      --font-size-body: clamp(0.88rem, 2vw, 1rem);
      --font-size-small: clamp(0.72rem, 1.8vw, 0.82rem);

      --font-weight-black: 900;
      --font-weight-bold: 800;
      --font-weight-semibold: 700;
      --font-weight-regular: 400;

      --line-height-display: 0.92;
      --line-height-title: 1.08;
      --line-height-body: 1.55;
      --line-height-small: 1.45;

      --letter-spacing-tight: -0.05em;
      --letter-spacing-normal: 0;
      --letter-spacing-wide: 0.08em;

      /* Colors */
      --color-page-bg: #dfe5e8;
      --color-paper: #e8edf0;
      --color-card: #f7f9fa;
      --color-title: #050505;
      --color-text: #222222;
      --color-muted: #646c70;
      --color-border: #111111;
      --color-border-soft: #aab3b8;
      --color-dark: #050505;
      --color-dark-soft: #191919;
      --color-inverse: #ffffff;
      --color-accent: #ff6a4f;
      --color-accent-2: #ffd84d;

      /* Spacing */
      --space-1: 0.25rem;
      --space-2: 0.5rem;
      --space-3: 0.75rem;
      --space-4: 1rem;
      --space-5: 1.25rem;
      --space-6: 1.5rem;
      --space-8: 2rem;
      --section-gap: var(--space-5);
      --card-padding: var(--space-4);
      --element-gap: var(--space-3);

      /* Radius & Shadow */
      --radius-none: 0;
      --radius-sm: 0.25rem;
      --shadow-none: none;
      --shadow-hard: 0 0.35rem 0 rgba(0, 0, 0, 0.18);

      /* Layout */
      --poster-width: 430px;
      --poster-padding: clamp(1.25rem, 4vw, 1.75rem);
    }

    * { box-sizing: border-box; }

    html {
      margin: 0;
      font-family: var(--font-family-base);
      background: var(--color-page-bg);
      color: var(--color-text);
      line-height: var(--line-height-body);
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: start center;
      padding: var(--space-6);
      background: var(--color-page-bg);
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .poster {
      width: min(100%, var(--poster-width));
      background: var(--color-paper);
      padding: var(--poster-padding);
      color: var(--color-text);
      box-shadow: var(--shadow-hard);
    }

    .poster-rule {
      height: 0;
      border-top: 3px solid var(--color-border);
      margin-bottom: var(--space-2);
    }

    .hero-heading {
      margin: 0;
      font-family: var(--font-family-display);
      font-size: var(--font-size-h1);
      line-height: var(--line-height-display);
      font-weight: var(--font-weight-black);
      letter-spacing: var(--letter-spacing-tight);
      color: var(--color-title);
      text-transform: uppercase;
      white-space: nowrap;
    }

    .headline-strip {
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: center;
      gap: var(--space-2);
      margin-top: var(--space-2);
      margin-bottom: var(--section-gap);
    }

    .headline-strip__main,
    .headline-strip__brand,
    .section-title,
    .micro-banner {
      background: var(--color-dark);
      color: var(--color-inverse);
    }

    .headline-strip__main {
      padding: var(--space-1) var(--space-4);
      font-size: var(--font-size-h3);
      line-height: 1.2;
      font-weight: var(--font-weight-bold);
      text-align: center;
      letter-spacing: var(--letter-spacing-wide);
    }

    .headline-strip__brand {
      padding: var(--space-1) var(--space-3);
      font-size: var(--font-size-small);
      line-height: 1.3;
      font-weight: var(--font-weight-semibold);
      white-space: nowrap;
    }

    .visual-section {
      margin-bottom: var(--section-gap);
    }

    .img-placeholder {
      width: 100%;
      min-height: 10rem;
      display: grid;
      place-items: center;
      padding: var(--space-4);
      border: 2px dashed var(--color-border-soft);
      background: rgba(255, 255, 255, 0.45);
      color: var(--color-muted);
      font-size: var(--font-size-small);
      line-height: var(--line-height-small);
      text-align: center;
      word-break: break-word;
    }

    .img-placeholder--dark {
      min-height: 13.5rem;
      border-color: rgba(255, 255, 255, 0.48);
      background: var(--color-dark-soft);
      color: var(--color-inverse);
    }

    .img-placeholder--qr {
      aspect-ratio: 1 / 1;
      min-height: auto;
      padding: var(--space-2);
      background: var(--color-card);
      color: var(--color-muted);
    }

    .main-slogan {
      margin: 0 0 var(--space-3);
      font-family: var(--font-family-display);
      font-size: var(--font-size-h2);
      line-height: var(--line-height-title);
      font-weight: var(--font-weight-black);
      letter-spacing: var(--letter-spacing-tight);
      color: var(--color-title);
      text-align: center;
    }

    .micro-banner {
      display: grid;
      grid-template-columns: 34% 1fr;
      align-items: center;
      gap: var(--space-2);
      padding: var(--space-1) var(--space-2);
      margin-bottom: var(--section-gap);
      font-size: var(--font-size-small);
      line-height: 1.25;
      font-weight: var(--font-weight-semibold);
    }

    .micro-banner__pattern {
      height: 0.9rem;
      border: 1px dashed rgba(255, 255, 255, 0.75);
      background: transparent;
    }

    .job-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: var(--space-5) var(--space-6);
      margin-bottom: var(--section-gap);
    }

    .job-card {
      background: transparent;
      color: var(--color-text);
    }

    .section-title {
      display: block;
      width: fit-content;
      min-width: 72%;
      padding: var(--space-1) var(--space-3);
      margin: 0 auto var(--space-2);
      font-size: var(--font-size-h3);
      line-height: 1.2;
      font-weight: var(--font-weight-bold);
      text-align: center;
    }

    .job-card p {
      margin: 0;
      font-size: var(--font-size-body);
      line-height: var(--line-height-body);
      color: var(--color-text);
    }

    .footer-area {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: var(--space-4);
      align-items: end;
    }

    .footer-copy {
      display: grid;
      gap: var(--space-1);
    }

    .small-text {
      margin: 0;
      font-size: var(--font-size-small);
      line-height: var(--line-height-small);
      color: var(--color-muted);
    }

    .qr-grid {
      display: grid;
      grid-template-columns: repeat(2, 4rem);
      gap: var(--space-3);
      align-items: start;
    }

    .qr-item {
      display: grid;
      gap: var(--space-1);
      text-align: center;
    }

    .qr-label {
      font-size: var(--font-size-small);
      line-height: 1.2;
      color: var(--color-text);
    }

    @media (max-width: 768px) {
      body {
        padding: var(--space-3);
        place-items: start center;
      }

      .poster {
        box-shadow: var(--shadow-none);
      }

      .headline-strip {
        grid-template-columns: 1fr;
      }

      .headline-strip__brand {
        justify-self: end;
      }

      .micro-banner {
        grid-template-columns: 1fr;
      }

      .job-grid {
        grid-template-columns: 1fr;
        gap: var(--space-4);
      }

      .footer-area {
        grid-template-columns: 1fr;
        align-items: start;
      }

      .qr-grid {
        grid-template-columns: repeat(2, minmax(4rem, 1fr));
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <main class="poster" aria-label="{{页面说明}}">
    <div class="poster-rule"></div>

    <header class="poster-header">
      <h1 class="hero-heading">{{英文主标题}}</h1>
      <div class="headline-strip">
        <div class="headline-strip__main">{{副标题}}</div>
        <div class="headline-strip__brand">{{品牌名}}</div>
      </div>
    </header>

    <section class="visual-section" aria-label="{{主视觉区域说明}}">
      <!-- 主视觉 720×420；用于核心插画 / 主KV / 人物场景图 -->
      <div class="img-placeholder img-placeholder--dark">
        图片占位<br />{{图片1_URL}}<br />{{图片1_描述}}
      </div>
    </section>

    <section class="slogan-section" aria-label="{{口号区域说明}}">
      <h2 class="main-slogan">{{主口号}}</h2>
      <div class="micro-banner">
        <div class="micro-banner__pattern" aria-label="{{装饰条说明}}"></div>
        <div>{{短句标语}}</div>
      </div>
    </section>

    <section class="job-grid" aria-label="{{信息分组区域说明}}">
      <article class="job-card">
        <h3 class="section-title">{{栏目标题1}}</h3>
        <p>{{段落一}}</p>
      </article>

      <article class="job-card">
        <h3 class="section-title">{{栏目标题2}}</h3>
        <p>{{段落二}}</p>
      </article>

      <article class="job-card">
        <h3 class="section-title">{{栏目标题3}}</h3>
        <p>{{段落三}}</p>
      </article>

      <article class="job-card">
        <h3 class="section-title">{{栏目标题4}}</h3>
        <p>{{段落四}}</p>
      </article>
    </section>

    <footer class="footer-area" aria-label="{{底部信息区域说明}}">
      <div class="footer-copy">
        <p class="small-text">{{说明文字1}}</p>
        <p class="small-text">{{说明文字2}}</p>
        <p class="small-text">{{说明文字3}}</p>
        <a class="small-text" href="{{链接1_URL}}">{{链接1_文字}}</a>
      </div>

      <div class="qr-grid">
        <div class="qr-item">
          <!-- 二维码 160×160；用于报名入口 / 联系入口 -->
          <div class="img-placeholder img-placeholder--qr">
            图片占位<br />{{图片2_URL}}<br />{{图片2_描述}}
          </div>
          <div class="qr-label">{{二维码说明1}}</div>
        </div>

        <div class="qr-item">
          <!-- 二维码 160×160；用于了解更多 / 资料入口 -->
          <div class="img-placeholder img-placeholder--qr">
            图片占位<br />{{图片3_URL}}<br />{{图片3_描述}}
          </div>
          <div class="qr-label">{{二维码说明2}}</div>
        </div>
      </div>
    </footer>
  </main>
</body>
</html>
